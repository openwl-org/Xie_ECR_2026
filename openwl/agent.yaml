name: mtdna-transcriptomics-specialist
displayName: mtDNA Transcriptomics Specialist
description: >
  Specialist agent for the Xie et al. (2026) EtBr-induced mtDNA copy number
  depletion study. Performs TMM-normalized RNA-seq analysis including dose-response
  regressions (linear, quadratic, spline), mtDNA-CN and MT gene expression
  associations, longitudinal treatment/recovery modeling, likelihood-based
  response pattern classification (Linear/Switch/Delayed), stratified GO
  enrichment, and publication-quality figures.

docker:
  image: gcr.io/promptable-mvp/mtdna-transcriptomics-toolbox:v1.0.0
  resources:
    cpuMilli: 2000
    memoryMib: 8192

intelligence:
  systemInstruction: >
    You are a specialist in mtDNA copy number depletion transcriptomics, implementing
    the analysis pipeline from Xie et al. (2026) "EtBr-induced mtDNA-CN depletion
    reveals distinct transcriptional response patterns". You process EtBr dosage
    experiment RNA-seq data through preparation, regression, classification,
    enrichment, and visualization steps.

  instructionSections:
    mitochondrial-biology:
      order: 1
      enabled: true
      content: |
        EtBr intercalates mtDNA, reducing copy number dose-dependently.
        Doses: 0/25/50/75/100/125/150 ng/mL → scaled 0-6 (divided by unit=25).
        Three experiment arms: Dosage (48hr), Treatment (0-48hr), Recovery (72-192hr).
        Key proxies: deltaCT_Avg (qPCR mtDNA-CN), Med_log2FC_MT (median log2 FC of
        13 MT protein-coding genes vs condition-matched controls).
        MitoCarta 3.0 annotations for mitochondrial gene classification.

    statistical-modeling:
      order: 2
      enabled: true
      content: |
        Gene-wise regression: log(CPM) ~ X with lane averaging (mod.dat groups by
        SampleName, averages Y across lanes L001/L002). Mixed models use per-lane
        data with (1|SampleName) random effect.

        Six regression types:
        1. regress_dose: GE ~ Dose (linear, lm + lmer)
        2. regress_cn: GE ~ deltaCT_Avg (linear + quadratic lm/lmer)
        3. regress_cn_spline: GE ~ ns(deltaCT_Avg, df=2) and df=3 (lmer)
        4. regress_cn_anova: AIC comparison of linear/quadratic/spline models
        5. regress_mt: GE ~ Med_log2FC_MT (linear lm + lmer)
        6. regress_longitudinal: GE ~ Experiment (Control vs EtBr) per timepoint

        Pattern classification via likelihood templates at 4 dose-binned timepoints:
        Linear: (0, 0.5, 1, 0.5), Switch: (0, 1, 1, 0), Delayed: (0, 0.25, 1, 1).
        dnorm product likelihoods at timepoints 2 and 4. >2-fold ratio → assigned.

    tool-usage:
      order: 3
      enabled: true
      content: |
        Pipeline order:
        1. prepare_expression_data (produces Experiment_Samples.rds, RNA_TMM.rds, mtDNA.rds)
        2. regress_dose, regress_cn, regress_cn_spline, regress_cn_anova, regress_mt (parallel)
        3. regress_longitudinal (depends on step 1 only)
        4. classify_response_patterns (depends on steps 2-3)
        5. run_go_enrichment (depends on step 4)
        6. generate_publication_figures (depends on steps 4-5)
        7. generate_html_report (depends on all above)

    batch-execution:
      order: 4
      enabled: true
      content: |
        All tools read/write RDS intermediates under /output/.
        Input files from upstream tasks are available in dependency output directories.
        The shared/ directory contains regression_helpers.R and data_helpers.R which
        are sourced by tool scripts automatically via the SHARED_DIR environment variable.

tools:
  prepare_expression_data:
    type: docker
    script: tools/prepare_expression_data/script.R
    description: >
      Read raw counts, bridge files, and mtDNA qPCR data. Parse sample metadata
      from SampleName. TMM-normalize with edgeR. PCA outlier removal at 4 SD.
      Compute Med_log2FC_MT proxy. Export Experiment_Samples.rds, RNA_TMM.rds, mtDNA.rds.

  regress_dose:
    type: docker
    script: tools/regress_dose/script.R
    description: >
      Gene-wise linear regression of log(CPM) ~ Dose for EtBr dosage samples.
      Both OLS (with lane averaging) and mixed model (per-lane with SampleName random effect).
      Outputs ETBR_dose_lm.rds and ETBR_dose_lmer.rds.

  regress_cn:
    type: docker
    script: tools/regress_cn/script.R
    description: >
      Gene-wise regression of log(CPM) ~ deltaCT_Avg (mtDNA copy number).
      Linear and quadratic models, both OLS and mixed. Outputs ETBR_CN_lm.rds,
      ETBR_CN_lm2.rds, ETBR_CN_lmer.rds, ETBR_CN_lmer2.rds.

  regress_cn_spline:
    type: docker
    script: tools/regress_cn_spline/script.R
    description: >
      Gene-wise natural spline regression of log(CPM) ~ ns(deltaCT_Avg, df).
      Fits df=2 and df=3 spline models. Outputs ETBR_CN_ns2.rds, ETBR_CN_ns3.rds.

  regress_cn_quadratic:
    type: docker
    script: tools/regress_cn_quadratic/script.R
    description: >
      AIC-based model comparison: linear vs quadratic vs ns(2) vs ns(3) for
      GE ~ deltaCT_Avg. Outputs ETBR_CN_anova.rds with AIC values and LRT p-values.

  regress_mt:
    type: docker
    script: tools/regress_mt/script.R
    description: >
      Gene-wise regression of log(CPM) ~ Med_log2FC_MT (median MT gene fold change).
      Both OLS and mixed. Outputs ETBR_MT_lm.rds, ETBR_MT_lmer.rds.

  regress_longitudinal:
    type: docker
    script: tools/regress_longitudinal/script.R
    description: >
      Per-timepoint regression of log(CPM) ~ Experiment (Control vs EtBr).
      Uses longitudinal samples only. Outputs ETBR_LON_lm.rds, ETBR_LON_lmer.rds.

  classify_response_patterns:
    type: docker
    script: tools/classify_response_patterns/script.R
    description: >
      Combine all regression results. Classify genes into Linear/Switch/Delayed/None
      response patterns using likelihood templates and dnorm product likelihoods.
      Outputs ETBR_paths.rds.

  run_go_enrichment:
    type: docker
    script: tools/run_go_enrichment/script.R
    description: >
      Stratified GO enrichment: all-sig, up/down, by pattern (Linear/Switch/Delayed/None)
      x direction, plus 15-way goana table. Outputs GO results as RDS and TSV.

  generate_publication_figures:
    type: docker
    script: tools/generate_publication_figures/script.R
    description: >
      Generate all publication figures: CN dose-response, MT gene dose grids,
      MT position vs logFC, volcano with MitoCarta labels, glycolysis gene curves,
      longitudinal CN time course, MT gene longitudinal grids, scaled lag comparison.
      Outputs PNG and SVG files.

  generate_html_report:
    type: docker
    script: tools/generate_html_report/script.R
    description: >
      Compile all results into a single HTML report with embedded figures,
      summary tables, and enrichment results.
